# CI/CD Pipeline for Short Video Agent
#
# Runs on every push/PR to main:
# 1. Lint — ruff check
# 2. Test — pytest on the production Python 3.12.13 lock with coverage
# 3. Frontend — eslint, TypeScript, Vitest, Next build
# 4. Coverage — uploads xml report (non-blocking)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.13"
          cache: "pip"

      - name: Install uv
        run: python -m pip install uv==0.11.11

      - name: Sync locked dependencies
        run: uv sync --locked --extra dev

      - name: Check code style
        run: uv run --locked --extra dev ruff check src tests scripts --output-format=github

      - name: Type check
        run: make typecheck

  test:
    name: Test (Python 3.12.13)
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.13"
          cache: "pip"

      - name: Install uv
        run: python -m pip install uv==0.11.11

      - name: Set up Node.js for OpenAPI type drift guard
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install media test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install OpenAPI typegen dependencies
        run: cd web && npm ci

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run tests with coverage
        run: uv run --locked --extra dev python -m pytest tests/ --tb=short -v --cov=src --cov-report=xml
        env:
          API_KEY: "test-api-key-for-pytest"
          OPENAI_API_KEY: "sk-test"
          ANTHROPIC_API_KEY: "sk-ant-test"
          DEEPSEEK_API_KEY: ""
          POYO_API_KEY: ""
          SEEDANCE_API_KEY: ""
          SILICONFLOW_API_KEY: ""
          TIKTOK_ACCESS_TOKEN: ""
          TIKTOK_PUBLISH_ENABLED: "false"
          SHOPIFY_STORE_URL: ""
          SHOPIFY_ACCESS_TOKEN: ""
          SHOPIFY_PUBLISH_ENABLED: "false"
          SUPABASE_URL: ""
          SUPABASE_SERVICE_KEY: ""
          ELEVENLABS_API_KEY: ""

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  vulnerability-scan:
    name: Dependency vulnerability scan
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.13"
          cache: "pip"

      - name: Install uv
        run: python -m pip install uv==0.11.11

      - name: Sync locked dependencies
        run: uv sync --locked --extra dev

      - name: Audit locked Python environment
        run: uv run --locked --extra dev pip-audit

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            web/package-lock.json
            rendering/package-lock.json

      - name: Audit frontend production dependencies
        run: cd web && npm audit --omit=dev --audit-level=high

      - name: Audit rendering production dependencies
        run: cd rendering && npm audit --omit=dev --audit-level=high

  docs-link-check:
    name: Docs link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --exclude '^https?://(localhost|127\.0\.0\.1|101\.34\.52\.232)'
            --exclude '^file://'
            README.md
            AGENTS.md
            docs/claude/known-gaps-stable.md
            docs/claude/project-standard-stable.md
            docs/claude/updates/project-updates-202605-stable.md
            docs/reference/api-endpoints.md
            docs/runbooks/README.md
            docs/runbooks/admin-csrf-contract.md
            docs/runbooks/api-rate-limit-contract.md
            docs/runbooks/api-response-metadata-contract.md
            docs/runbooks/archive-draft-link-drift.md
            docs/runbooks/backend-route-auth-contract.md
            docs/runbooks/background-task-registry-leak.md
            docs/runbooks/brand-assets-refresh.md
            docs/runbooks/c2pa-cert-application.md
            docs/runbooks/db-pool-exhausted.md
            docs/runbooks/deepseek-timeout.md
            docs/runbooks/health-endpoint-no-secret.md
            docs/runbooks/docker-dev-tool-parity.md
            docs/runbooks/docker-no-token-preflight.md
            docs/runbooks/env-example-no-secret-drift.md
            docs/runbooks/github-actions-deploy-secrets.md
            docs/runbooks/github-deploy-secrets-setup.md
            docs/runbooks/gate-approve-idempotency.md
            docs/runbooks/key-rotation.md
            docs/runbooks/lighthouse-nginx-timeout-parity.md
            docs/runbooks/lighthouse-rsync-artifact-exclude.md
            docs/runbooks/markdown-frontmatter-compliance.md
            docs/runbooks/media-url-sanitizer.md
            docs/runbooks/monitoring-ownership.md
            docs/runbooks/p2-recharge-smoke-checklist.md
            docs/runbooks/phase1-signoff-checklist.md
            docs/runbooks/pipeline-stuck.md
            docs/runbooks/poyo-model-matrix-stale-warning.md
            docs/runbooks/poyo-rejection.md
            docs/runbooks/postgresql-readiness-bootstrap.md
            docs/runbooks/production-e2e-token-smoke.md
            docs/runbooks/publish-connector-truth.md
            docs/runbooks/publish-receipt-protocol-calibration.md
            docs/runbooks/transparency-delivery.md
            docs/runbooks/provider-cost-ledger-per-job-budget.md
            docs/runbooks/regenerate-downstream-invalidation.md
            docs/runbooks/release-smoke-token-opt-in.md
            docs/runbooks/remotion-no-provider-key.md
            docs/runbooks/root-directory-governance.md
            docs/runbooks/s4-footage-filtering.md
            docs/runbooks/s1-s5-hermetic-regression.md
            docs/runbooks/scripts-governance.md
            docs/runbooks/scenario-state-persistence-schema.md
            docs/runbooks/submission-idempotency-recovery.md
            docs/runbooks/thumbnail-missing.md
            docs/runbooks/ui-visual-baseline-sop.md
            docs/runbooks/workflow-trigger-path-audit.md
            docs/architecture/adr/README.md
            docs/architecture/adr/001-dual-runtime.md
            docs/architecture/adr/002-two-layer-auth.md
            docs/architecture/adr/003-db-strategy.md
            docs/architecture/adr/004-s3-copyright-fingerprint.md
            docs/architecture/adr/005-poster-extraction-everywhere.md
            docs/architecture/adr/006-c2pa-content-credentials.md
            docs/architecture/adr/007-defer-llm-director-planner.md
            docs/architecture/api-assets-pg-cutover-2026-05-15.md
            docs/architecture/product-architecture.md
            docs/architecture/poyo-model-matrix-stable.md
            docs/analysis/site-ui-ux-audit-plan-stable-20260531.md
            docs/guide/quick-start.md
            docs/knowledge/deploy-lessons-learned-stable.md
            docs/knowledge/local-vs-production-stable.md
            docs/knowledge/user-guide.md
            docs/product/brand-asset-template.md
            docs/product/momcozy-brand-brief.md
            docs/workflows/deploy-lighthouse-stable.md
            docs/workflows/deploy-test-sop-stable.md
            docs/workflows/deployment-sop-stable.md
            docs/workflows/ai-video-project-2-0-e2e-test-plan-stable.md
            docs/workflows/ai-video-project-2-0-final-self-proof-stable.md
            docs/workflows/l4d-real-media-provider-evidence-index-stable.md
            docs/workflows/portfolio-ops-stable.md
            docs/workflows/update-guide-stable.md
            deploy/local-run.md
            deploy/tencent-cloudbase.md
            deploy/CLOUDBASE_STEP_BY_STEP.md
            deploy/lighthouse/PHASE0-DEPLOY-SOP-2026-05-15.md
          fail: true

  frontend-test:
    name: Frontend quality gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src e2e playwright.ui.config.ts playwright.prod.config.ts

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Run vitest
        run: npm test -- --run

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_IS_DEMO: "true"

  docker-build:
    name: Docker build validate (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.13"
          cache: "pip"

      - name: Install uv
        run: python -m pip install uv==0.11.11

      - name: Sync locked dependencies
        run: uv sync --locked --extra dev

      - name: Docker compose config validation (no start)
        run: |
          : > .env
          docker compose -f docker-compose.yml config --quiet
          AI_VIDEO_SHARED_ROOT=/tmp/ai-video-shared AI_VIDEO_ENV_FILE=/dev/null \
            PORTAL_AUTH_ENV_FILE=/dev/null RELEASE_SOURCE_SHA=${{ github.sha }} \
            RELEASE_IMAGE_TAG=${{ github.sha }} \
            docker compose -f deploy/lighthouse/docker-compose.release.yml config --quiet

      - name: Validate Prometheus rules and monitoring ownership
        run: make monitoring-check

      - name: Build backend image (validate, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.backend
          push: false
          load: true
          tags: ai-video-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APT_MIRROR=deb.debian.org
            RELEASE_SOURCE_SHA=${{ github.sha }}

      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.33.1
        env:
          TRIVY_IGNOREFILE: .trivyignore.yaml
        with:
          version: v0.69.3
          image-ref: ai-video-backend:ci-${{ github.sha }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 1
