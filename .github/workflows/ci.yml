# CI/CD Pipeline for Short Video Agent
#
# Runs on every push/PR to main:
# 1. Lint — ruff check
# 2. Test — pytest on Python 3.11 + 3.12 with coverage
# 3. Coverage — uploads xml report (non-blocking)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: pip install ruff

      - name: Check code style
        run: ruff check src/ --output-format=github

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest tests/ --tb=short -v --cov=src --cov-report=xml
        env:
          OPENAI_API_KEY: "sk-test"
          ANTHROPIC_API_KEY: "sk-ant-test"
          SUPABASE_URL: ""
          SUPABASE_SERVICE_KEY: ""
          ELEVENLABS_API_KEY: ""

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  docs-link-check:
    name: Docs link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --exclude '^https?://(localhost|127\.0\.0\.1|101\.34\.52\.232)' 'docs/**/*.md' '.kiro/plan/*.md' 'AGENTS.md' 'README.md'
          fail: false
        continue-on-error: true

  frontend-test:
    name: Frontend test (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.json
        continue-on-error: true

      - name: Run vitest
        run: npx vitest run
