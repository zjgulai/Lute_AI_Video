# Current FastAPI route authentication contract.
# Any new public route must be added here with an explicit reason and reviewed.

public_routes:
  - method: GET
    path: /health
    reason: Load balancer and deploy smoke health check.
  - method: GET
    path: /metrics
    reason: Prometheus scrape endpoint; production exposure is controlled at nginx/network layer.
  - method: GET
    path: /api/media/{media_path:path}
    reason: Unsigned access is limited to brand_assets/demo; every protected path requires a tenant-bound token in media.py.
  - method: POST
    path: /api/admin/auth/login
    reason: Admin credential login entrypoint; uses rate limiting and password verification instead of session auth.

api_key_router_mounts:
  - pipeline.router
  - scenario.router
  - submissions.router
  - acceptance_records.router
  - distribution.router
  - metrics.router
  - assets.router
  - portfolio.router
  - api_assets.router
  - telemetry_endpoint.router

public_router_mounts:
  - health.router
  - prometheus.router

mixed_router_mounts:
  - media.router

admin_session_router_mounts:
  - admin_router

admin_csrf_exempt_routes:
  - method: POST
    path: /api/admin/auth/login
    reason: Login has no session yet; it creates admin_session and admin_csrf cookies.

acceptance_record_routes:
  required_any_permission:
    - artifact:accept
    - all
  provider_submit_only_allowed: false
  routes:
    - name: create
      method: POST
      path: /acceptance-records
    - name: read
      method: GET
      path: /acceptance-records/{acceptance_id}
    - name: revoke
      method: POST
      path: /acceptance-records/{acceptance_id}/revoke
  public_consume_endpoint: false
  distribution_integration: W1-23 completed_local

publish_acceptance_routes:
  required_any_permission:
    - artifact:publish
    - all
  artifact_accept_only_allowed: false
  provider_submit_only_allowed: false
  single_platform_only: true
  client_artifact_path_allowed: false
  body_human_assertion_allowed: false
  public_consume_endpoint: false
  routes:
    - name: canonical
      method: POST
      path: /distribution/publish
      deprecated: false
    - name: legacy_adapter
      method: POST
      path: /publish/{video_id}
      deprecated: true
