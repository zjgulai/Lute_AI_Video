version: 1
owner: platform
status: stable
updated: "2026-06-01"

entrypoints:
  env_example: .env.example
  src_config: src/config.py
  env_config_tests: tests/test_env_config_ssot.py
  runbook: docs/runbooks/env-example-no-secret-drift.md

active_env_docs:
  - deploy/tencent-cloudbase.md
  - deploy/CLOUDBASE_STEP_BY_STEP.md
  - deploy/local-run.md
  - docs/knowledge/local-vs-production-stable.md
  - docs/workflows/deploy-lighthouse-stable.md
  - docs/workflows/deploy-test-sop-stable.md
  - docs/runbooks/p2-recharge-smoke-checklist.md
  - docs/runbooks/production-e2e-token-smoke.md

rules:
  env_example_sensitive_values_placeholder_only: true
  src_config_sensitive_fallbacks_empty: true
  active_deploy_env_docs_no_real_secrets: true
  no_gitignored_prod_env_scan: true
  no_plaintext_provider_keys: true
  placeholders_allowed:
    - empty string
    - sk-your-*
    - local-dev-api-key-change-me
    - ai_video_demo_2026
    - angle-bracket placeholders
    - redacted markers

forbidden_patterns:
  - real sk-* provider keys
  - poyo_* token-like values
  - sf-* token-like values
  - generic high-entropy secret values on sensitive env lines

tests:
  no_secret_guard: tests/test_env_config_ssot.py

commands:
  focused_test: .venv/bin/python -m pytest tests/test_env_config_ssot.py -q

no_token_boundary: true
