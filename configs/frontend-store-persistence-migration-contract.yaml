version: 1
owner: frontend
status: stable
updated: "2026-06-01"

entrypoints:
  persistence_module: web/src/stores/persistence.ts
  app_store: web/src/stores/useAppStore.ts
  pipeline_store: web/src/stores/usePipelineStore.ts
  runbook: docs/runbooks/frontend-store-persistence-migration.md

storage_keys:
  app: ai-video-app-store
  pipeline: ai-video-pipeline-store

versions:
  app: APP_STORE_PERSIST_VERSION
  pipeline: PIPELINE_STORE_PERSIST_VERSION

rules:
  app_store_persists_only:
    - mode
    - pipelineMode
    - videoDuration
  pipeline_store_persists_only:
    - activePipeline
    - dismissedPipelineLabels
  bad_json_recovery: createSafeJSONStorage
  invalid_payload_recovery: migrateAppStorePersistence + migratePipelineStorePersistence
  max_dismissed_pipeline_labels: 10
  no_runtime_ui_persistence: true
  no_generation_endpoints: true
  no_provider_calls: true

tests:
  persistence_guard: web/src/stores/persistence.test.ts

commands:
  focused_test: npm test -- --run src/stores/persistence.test.ts
  type_check: npx tsc --noEmit -p tsconfig.json

no_token_boundary: true
