version: 1
owner: backend
status: stable
updated: "2026-05-31"

public_endpoint: /health
skip_response_meta: true

allowed_top_level_keys:
  - status
  - version
  - remotion
  - persistence
  - media_tools

forbidden_value_classes:
  - provider_api_keys
  - database_urls
  - passwords
  - tokens
  - signing_secrets
  - absolute_internal_paths

redaction_markers:
  secret_value: "[redacted]"
  internal_path: "[internal-path]"

safe_status_fields:
  remotion:
    - available
    - node_version
    - remotion_version
    - render_script_exists
    - node_modules_exist
    - ffmpeg_ok
    - chromium_ok
    - issues
  persistence:
    - backend
    - status
    - tables_verified
    - pg_available
    - fallback
    - error
  media_tools:
    - ytdlp_available
    - whisper_available
    - clip_available
    - error
