version: 1
owner: backend
status: stable
updated: "2026-07-22"

scenarios:
  - s1
  - s2
  - s3
  - s4
  - s5

allowed_modes:
  - auto
  - step_by_step

required_top_level_keys:
  - schema_version
  - label
  - scenario
  - tenant_id
  - config
  - steps
  - current_step
  - mode
  - trace_id
  - errors
  - media_synthesis_errors
  - gates
  - pipeline_degraded
  - degraded_reason
  - structured_errors
  - regenerate_chain
  - soft_degraded_reasons

json_object_keys:
  - config
  - steps
  - gates

json_array_keys:
  - errors
  - media_synthesis_errors
  - structured_errors
  - regenerate_chain
  - soft_degraded_reasons

step_record_required_keys:
  - status
  - output
  - edited
  - edited_output
  - started_at
  - completed_at
  - duration_ms

initial_state_defaults:
  errors: []
  media_synthesis_errors: []
  gates: {}
  pipeline_degraded: false
  degraded_reason: null
  structured_errors: []
  regenerate_chain: []
  soft_degraded_reasons: []

server_owned_config_keys:
  pipeline_completion_metric_v1:
    version: pipeline-completion-metric.v1
    purpose: Durable at-most-once terminal metric claim before Prometheus emission.
    caller_supplied: false

no_token_boundary: true
