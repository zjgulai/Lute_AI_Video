# Shared ai_video location blocks — included by both video.lute-tlz-dddd.top
# server and the IP fallback server. Keeps both routes feature-equivalent
# without copy-paste drift.

# Health check — high burst for k8s/docker healthcheck cadence.
location /health {
    limit_req zone=api_limit burst=100 nodelay;
    proxy_pass http://backend/health;
    include /etc/nginx/proxy_params.conf;
}

# Prometheus exposition endpoint — no rate limit, scrape friendly.
location = /metrics {
    proxy_pass http://backend/metrics;
    include /etc/nginx/proxy_params.conf;
}

# Static media — nginx try_files first, fallback to backend.
location /api/media/ {
    limit_req zone=api_limit burst=1000 nodelay;
    alias /var/www/media/;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri @backend_media;
}

location @backend_media {
    proxy_pass http://backend;
    include /etc/nginx/proxy_params.conf;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
}

location /api/assets/ {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://backend/api/assets/;
    include /etc/nginx/proxy_params.conf;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
}

location /api/files {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://backend/api/files;
    include /etc/nginx/proxy_params.conf;
}

location /api/upload {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://backend/api/upload;
    include /etc/nginx/proxy_params.conf;
}

# Long-running pipeline routes — VLOG/Brand Campaign/Influencer Remix can run 5-20 min.
location /api/scenario/ {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://backend/scenario/;
    include /etc/nginx/proxy_params.conf;
    proxy_read_timeout 1500s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 1500s;
    proxy_buffering off;
}

location /api/fast/ {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://backend/fast/;
    include /etc/nginx/proxy_params.conf;
    proxy_read_timeout 1500s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 1500s;
    proxy_buffering off;
}

location /api/pipeline/ {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://backend/pipeline/;
    include /etc/nginx/proxy_params.conf;
    proxy_read_timeout 1500s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 1500s;
    proxy_buffering off;
}

location /telemetry/ {
    limit_req zone=api_limit burst=100 nodelay;
    proxy_pass http://backend/telemetry/;
    include /etc/nginx/proxy_params.conf;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
}

location /api/admin/ {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://backend/api/admin/;
    include /etc/nginx/proxy_params.conf;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
}

location /api/portfolio/ {
    limit_req zone=api_limit burst=100 nodelay;
    proxy_pass http://backend/portfolio/;
    include /etc/nginx/proxy_params.conf;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
}

# API routes -> backend (strip /api prefix)
location /api/ {
    limit_req zone=api_limit burst=20 nodelay;
    proxy_pass http://backend/;
    include /etc/nginx/proxy_params.conf;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
}

# Next.js static assets — content-hashed, immutable.
location /_next/ {
    proxy_pass http://frontend;
    include /etc/nginx/proxy_params.conf;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

# Frontend HTML — never cache (Turbopack chunk hashes change per build).
location / {
    proxy_pass http://frontend;
    include /etc/nginx/proxy_params.conf;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
}
