version: '3.8'

# Shared logging config: cap each container's stdout/stderr log file to 100MB,
# keep 3 rotated files. Prevents disk-fill deadlock under high error volume.
# Without this, docker default is unlimited per-container log files.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

services:
  backend:
    build:
      context: ../..
      dockerfile: Dockerfile.backend
    container_name: ai_video_backend
    # 2026-05-05 incident: backend import error 触发 unless-stopped 无限重启,
    # 拖死 docker daemon。改 on-failure:5 让 5 次失败后停止重启,人工介入。
    # rendering/frontend/nginx 保持 unless-stopped(它们不容易 import error,
    # 服务器重启后需要自动启动)。
    restart: on-failure:5
    expose:
      - "8001"
    env_file:
      - .env.prod
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - RENDERING_SERVICE_URL=http://rendering:3001
    volumes:
      - backend_output:/app/output
      - ../../src:/app/src:ro
      - ../../requirements.txt:/app/requirements.txt:ro
      - ../../pyproject.toml:/app/pyproject.toml:ro
    networks:
      - ai_video_net
    depends_on:
      - rendering
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging

  rendering:
    build:
      context: ../../rendering
      dockerfile: Dockerfile
    container_name: ai_video_rendering
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - OUTPUT_DIR=/app/output
    volumes:
      - backend_output:/app/output
    networks:
      - ai_video_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

  frontend:
    # P4-1: Use pre-built standalone output (host builds, Docker runs)
    # Build on host: cd /opt/ai-video/web && npm ci && npm run build
    image: node:22-alpine
    container_name: ai_video_frontend
    working_dir: /app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_BASE_URL=/api
      # P0-F: Lighthouse 是 canonical 非 demo 生产部署。这里设 false 保持与
      # build-time(deploy.sh:44)一致 — Next.js NEXT_PUBLIC_* 是构建时内联,
      # 这里 runtime env 实际不影响已构建前端,但保留避免误导。
      # GitHub Pages demo 部署单独构建,通过 build-arg 切回 true。
      - NEXT_PUBLIC_IS_DEMO=false
    volumes:
      # Mount the pre-built standalone output (server.js is at /app/server.js)
      - ../../web/.next/standalone:/app
      - ../../web/public:/app/public
      - ../../web/.next/static:/app/.next/static
    command: ["node", "server.js"]
    networks:
      - ai_video_net
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  nginx:
    image: nginx:alpine
    container_name: ai_video_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ai_video_locations.conf:/etc/nginx/ai_video_locations.conf:ro
      - ./proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./skills.conf:/etc/nginx/skills.conf:ro
      - ./server.crt:/etc/nginx/ssl/server.crt:ro
      - ./server.key:/etc/nginx/ssl/server.key:ro
      - ./landing:/var/www/landing:ro
      - /var/www/audit:/var/www/audit:ro
      - /opt/mkt53/html:/var/www/mkt53:ro
      - /opt/voc-report/html:/var/www/voc-report:ro
      - /opt/momcozy-audit/html:/var/www/momcozy-audit:ro
      - /opt/business-insight-hub/html:/var/www/business-insight-hub:ro
      - /opt/ai-product-select/html:/var/www/ai-product-select:ro
      - /opt/ai-employ-platform/html:/var/www/ai-employ-platform:ro
      - /opt/llm-compare-hub/html:/var/www/llm-compare-hub:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - backend_output:/var/www/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ai_video_net
    logging: *default-logging

volumes:
  backend_output:

networks:
  ai_video_net:
    driver: bridge
