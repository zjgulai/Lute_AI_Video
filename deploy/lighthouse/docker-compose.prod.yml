version: '3.8'

services:
  backend:
    build:
      context: ../..
      dockerfile: Dockerfile.backend
    container_name: ai_video_backend
    restart: unless-stopped
    expose:
      - "8001"
    env_file:
      - .env.prod
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    volumes:
      - backend_output:/app/output
      - ../../src:/app/src:ro
      - ../../requirements.txt:/app/requirements.txt:ro
    networks:
      - ai_video_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://101.34.52.232/api
        NEXT_PUBLIC_IS_DEMO: "true"
    container_name: ai_video_frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
    networks:
      - ai_video_net
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: ai_video_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./server.crt:/etc/nginx/ssl/server.crt:ro
      - ./server.key:/etc/nginx/ssl/server.key:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ai_video_net

volumes:
  backend_output:

networks:
  ai_video_net:
    driver: bridge
