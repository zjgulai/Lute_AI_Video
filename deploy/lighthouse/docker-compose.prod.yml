version: '3.8'

services:
  backend:
    build:
      context: ../..
      dockerfile: Dockerfile.backend
    container_name: ai_video_backend
    restart: unless-stopped
    expose:
      - "8001"
    env_file:
      - .env.prod
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - RENDERING_SERVICE_URL=http://rendering:3001
    volumes:
      - backend_output:/app/output
      - ../../src:/app/src:ro
      - ../../requirements.txt:/app/requirements.txt:ro
    networks:
      - ai_video_net
    depends_on:
      - rendering
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rendering:
    build:
      context: ../../rendering
      dockerfile: Dockerfile
    container_name: ai_video_rendering
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - OUTPUT_DIR=/app/output
    volumes:
      - backend_output:/app/output
    networks:
      - ai_video_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    # P4-1: Use pre-built standalone output (host builds, Docker runs)
    # Build on host: cd /opt/ai-video/web && npm ci && npm run build
    image: node:22-alpine
    container_name: ai_video_frontend
    working_dir: /app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_BASE_URL=/api
      # P0-F: Lighthouse 是 canonical 非 demo 生产部署。这里设 false 保持与
      # build-time(deploy.sh:44)一致 — Next.js NEXT_PUBLIC_* 是构建时内联,
      # 这里 runtime env 实际不影响已构建前端,但保留避免误导。
      # GitHub Pages demo 部署单独构建,通过 build-arg 切回 true。
      - NEXT_PUBLIC_IS_DEMO=false
    volumes:
      # Mount the pre-built standalone output (server.js is at /app/server.js)
      - ../../web/.next/standalone:/app
      - ../../web/public:/app/public
      - ../../web/.next/static:/app/.next/static
    command: ["node", "server.js"]
    networks:
      - ai_video_net
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: ai_video_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./server.crt:/etc/nginx/ssl/server.crt:ro
      - ./server.key:/etc/nginx/ssl/server.key:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ai_video_net

volumes:
  backend_output:

networks:
  ai_video_net:
    driver: bridge
