<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 LUTE AI Native Builder Lab</title>
<meta name="description" content="登录 LUTE AI Native Builder Lab">
<link rel="stylesheet" href="https://lute-tlz-dddd.top/lute-auth.css?v=20260606-auth-mail">
</head>
<body>
  <main class="auth-shell">
    <header class="auth-head">
      <a class="auth-mark" href="https://lute-tlz-dddd.top/"><span class="brand-inline">LUTE</span><span class="lab-inline">AI Native Builder Lab</span></a>
      <a class="back" href="https://lute-tlz-dddd.top/">返回首页</a>
    </header>

    <section class="auth-main" aria-labelledby="auth-title">
      <div>
        <h1 class="auth-title" id="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">用账号进入 LUTE 封面身份入口 当前版本不拦截卡片页和子域名应用</p>
        <div class="auth-creed"><span>敬畏数据</span><span>崇尚科学</span><span>自我革命</span><span>无私奉献</span><span>DDDD</span></div>
      </div>

      <form class="auth-panel" data-auth-form="login">
        <h2>登录</h2>
        <p>输入已完成邮箱确认的账号</p>
        <label class="field">
          <span>邮箱</span>
          <input name="email" type="email" autocomplete="email" required>
        </label>
        <label class="field">
          <span>密码</span>
          <input name="password" type="password" autocomplete="current-password" minlength="8" required>
        </label>
        <button class="submit" type="submit">登录</button>
        <div class="message" data-auth-message></div>
        <div class="switch">
          <span>还没有账号</span>
          <a href="https://lute-tlz-dddd.top/register.html?v=20260606-auth-mail" data-preserve-next="register">注册</a>
        </div>
      </form>
    </section>

    <footer class="auth-foot">
      <span>DATA AND DIGITAL DEVELOPMENT CENTER</span>
      <span>DDDD BRAND SYSTEM</span>
    </footer>
  </main>
  <script src="https://lute-tlz-dddd.top/lute-auth.js?v=20260606-auth-mail" defer></script>
</body>
</html>
