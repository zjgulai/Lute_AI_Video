<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>注册 LUTE AI Native Builder Lab</title>
<meta name="description" content="注册 LUTE AI Native Builder Lab">
<link rel="stylesheet" href="https://lute-tlz-dddd.top/lute-auth.css?v=20260606-auth-mail">
</head>
<body>
  <main class="auth-shell">
    <header class="auth-head">
      <a class="auth-mark" href="https://lute-tlz-dddd.top/"><span class="brand-inline">LUTE</span><span class="lab-inline">AI Native Builder Lab</span></a>
      <a class="back" href="https://lute-tlz-dddd.top/">返回首页</a>
    </header>

    <section class="auth-main" aria-labelledby="auth-title">
      <div>
        <h1 class="auth-title" id="auth-title">Create Access</h1>
        <p class="auth-subtitle">注册只用于封面页身份状态 当前版本不控制卡片页和子域名应用访问</p>
        <div class="auth-creed"><span>敬畏数据</span><span>崇尚科学</span><span>自我革命</span><span>无私奉献</span><span>DDDD</span></div>
      </div>

      <form class="auth-panel" data-auth-form="register">
        <h2>注册</h2>
        <p>创建邮箱密码账号后查收确认链接</p>
        <label class="field">
          <span>姓名</span>
          <input name="display_name" type="text" autocomplete="name">
        </label>
        <label class="field">
          <span>邮箱</span>
          <input name="email" type="email" autocomplete="email" required>
        </label>
        <label class="field">
          <span>密码</span>
          <input name="password" type="password" autocomplete="new-password" minlength="8" required>
        </label>
        <label class="field">
          <span>确认密码</span>
          <input name="confirm_password" type="password" autocomplete="new-password" minlength="8" required>
        </label>
        <button class="submit" type="submit">注册</button>
        <div class="message" data-auth-message></div>
        <div class="switch">
          <span>已有账号</span>
          <a href="https://lute-tlz-dddd.top/login.html?v=20260606-auth-mail" data-preserve-next="login">登录</a>
        </div>
      </form>
    </section>

    <footer class="auth-foot">
      <span>DATA AND DIGITAL DEVELOPMENT CENTER</span>
      <span>DDDD BRAND SYSTEM</span>
    </footer>
  </main>
  <script src="https://lute-tlz-dddd.top/lute-auth.js?v=20260606-auth-mail" defer></script>
</body>
</html>
