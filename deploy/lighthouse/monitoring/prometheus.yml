global:
  scrape_interval: 30s
  evaluation_interval: 30s
rule_files:
  - /etc/prometheus/prometheus-alerts.yml
alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]
scrape_configs:
  - job_name: ai-video-backend
    metrics_path: /metrics
    static_configs:
      - targets: [backend:8001]
