events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream backend {
        server backend:8001;
    }

    upstream frontend {
        server frontend:3000;
    }

    # Rate limiting (P2-11): 120 req/min per IP, 10MB zone shared across workers.
    # FastAPI middleware is kept as fallback when nginx is not the entrypoint.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;
    limit_req_status 429;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name 101.34.52.232;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name 101.34.52.232;

        # SSL certificate (self-signed)
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Rate limit is applied per-location only (API endpoints).
        # Frontend HTML / /_next/ static / favicon are NOT rate-limited:
        # a Next.js cold load can fire 30+ requests in <1s and would
        # blow through any reasonable burst budget.

        # Health check — high burst for k8s/docker healthcheck cadence
        location /health {
            limit_req zone=api_limit burst=100 nodelay;
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Static media — nginx try_files first, fallback to backend.
        # backend_output volume mounted at /var/www/media so files are served
        # directly without hitting Python.  Cache-Control for browser caching.
        # Exempt from rate limit: gallery can load 400+ images simultaneously.
        location /api/media/ {
            limit_req zone=api_limit burst=1000 nodelay;
            alias /var/www/media/;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri @backend_media;
        }

        # Named location used only when nginx static file miss.
        # proxy_pass cannot have URI part in named location, so pass full original
        # URI (/api/media/...) to backend unchanged.
        location @backend_media {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
        }

        location /api/assets/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend/api/assets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
        }

        location /api/files {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend/api/files;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/upload {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend/api/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Long-running pipeline routes — VLOG/Brand Campaign/Influencer Remix can run 5-20 min
        location /api/scenario/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend/scenario/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 1500s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 1500s;
            proxy_buffering off;
        }

        location /api/fast/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend/fast/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 1500s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 1500s;
            proxy_buffering off;
        }

        location /api/pipeline/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend/pipeline/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 1500s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 1500s;
            proxy_buffering off;
        }

        # Telemetry routes -> backend
        location /telemetry/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend/telemetry/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
        }

        # Admin routes -> backend (preserve /api/admin prefix)
        location /api/admin/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend/api/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
        }

        # API routes -> backend (strip /api prefix)
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-running pipeline requests
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
        }

        # Next.js static assets (/_next/static/*) — content-hashed filenames,
        # safe for long-term immutable caching. Must be before location / so
        # nginx picks the longer prefix match.
        location /_next/ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Frontend -> Next.js (HTML pages + dynamic routes)
        # CRITICAL: HTML pages reference JS chunks by Turbopack content-hash
        # filenames that change on every build. If an old HTML is cached after
        # a redeploy, the referenced chunks may no longer exist, causing
        # ChunkLoadError (e.g. /footage "Failed to load chunk 12k1vegccjm7k.js").
        # Prevent all HTML caching; static assets are handled by location /_next/.
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }
    }
}
