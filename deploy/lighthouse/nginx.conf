events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream backend {
        server backend:8001;
    }

    upstream frontend {
        server frontend:3000;
    }

    upstream voc_superset {
        server voc_superset:8088;
    }

    # Rate limiting (P2-11): 120 req/min per IP, 10MB zone shared across workers.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;
    limit_req_status 429;

    # ── HTTP — ACME challenge + redirect ──────────────────────────────────
    # All domains share one :80 listener. /.well-known/acme-challenge/ is
    # served from /var/www/certbot (mounted from host) so `certbot certonly
    # --webroot` works for cert renewal/expansion without nginx downtime.
    server {
        listen 80 default_server;
        server_name video.lute-tlz-dddd.top voc.lute-tlz-dddd.top lute-tlz-dddd.top 101.34.52.232 _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — video.lute-tlz-dddd.top (ai_video, canonical domain) ──────
    server {
        listen 443 ssl;
        http2 on;
        server_name video.lute-tlz-dddd.top;

        ssl_certificate /etc/letsencrypt/live/lute-tlz-dddd.top/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lute-tlz-dddd.top/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        include /etc/nginx/ai_video_locations.conf;
    }

    # ── HTTPS — voc.lute-tlz-dddd.top (voc_superset) ──────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name voc.lute-tlz-dddd.top;

        ssl_certificate /etc/letsencrypt/live/lute-tlz-dddd.top/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lute-tlz-dddd.top/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://voc_superset;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── HTTPS — IP fallback / lute root (preserved for backward compat) ───
    # IP-direct access uses self-signed cert (TLS will warn but works).
    # lute-tlz-dddd.top (apex) currently falls back here as well, serving ai_video.
    server {
        listen 443 ssl default_server;
        http2 on;
        server_name 101.34.52.232 lute-tlz-dddd.top _;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        include /etc/nginx/ai_video_locations.conf;
    }
}
