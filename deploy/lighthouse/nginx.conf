    # ── HTTPS — IP fallback (preserved for backward compat) ───────────────
    # IP-direct access uses self-signed cert (TLS will warn but works).
    # Anything that doesn't match the named server blocks above lands here.
    server {
        listen 443 ssl default_server;
        http2 on;
        server_name 101.34.52.232 _;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        include /etc/nginx/ai_video_locations.conf;
    }
