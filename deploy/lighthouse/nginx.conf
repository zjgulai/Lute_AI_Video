events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream ai_video_backend {
        server ai_video_backend:8001;
    }

    upstream ai_video_frontend {
        server ai_video_frontend:3000;
    }

    upstream voc_superset {
        server voc_superset:8088;
    }

    upstream medical_audit_app {
        server medical_audit_app:8000;
    }

    upstream promptforge_app {
        server promptforge_app:3000;
    }

    # Rate limiting (P2-11): 120 req/min per IP, 10MB zone shared across workers.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;
    limit_req_status 429;

    # ── HTTP — ACME challenge + redirect ──────────────────────────────────
    # All domains share one :80 listener. /.well-known/acme-challenge/ is
    # served from /var/www/certbot (mounted from host) so `certbot certonly
    # --webroot` works for cert renewal/expansion without nginx downtime.
    server {
        listen 80 default_server;
        server_name video.lute-tlz-dddd.top voc.lute-tlz-dddd.top audit.lute-tlz-dddd.top
            mkt.lute-tlz-dddd.top brand.lute-tlz-dddd.top shopify.lute-tlz-dddd.top
            mas.lute-tlz-dddd.top report.lute-tlz-dddd.top business.lute-tlz-dddd.top
            product.lute-tlz-dddd.top kg.lute-tlz-dddd.top person.lute-tlz-dddd.top
            llm.lute-tlz-dddd.top lute-tlz-dddd.top 101.34.52.232 _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — video.lute-tlz-dddd.top (ai_video, canonical domain) ──────
    server {
        listen 443 ssl;
        http2 on;
        server_name video.lute-tlz-dddd.top;

        # Security headers (debt-audit V2, 2026-06-09)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        ssl_certificate /etc/letsencrypt/live/lute-tlz-dddd.top/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lute-tlz-dddd.top/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        include /etc/nginx/ai_video_locations.conf;
    }

    # ── HTTPS — brand/mas aliases (ai_video entrypoints) ──────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name brand.lute-tlz-dddd.top mas.lute-tlz-dddd.top;

        ssl_certificate /etc/letsencrypt/live/lute-tlz-dddd.top/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lute-tlz-dddd.top/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        include /etc/nginx/ai_video_locations.conf;
    }

    # ── HTTPS — voc.lute-tlz-dddd.top (voc_superset) ──────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name voc.lute-tlz-dddd.top;

        ssl_certificate /etc/letsencrypt/live/lute-tlz-dddd.top/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lute-tlz-dddd.top/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://voc_superset;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── HTTPS — audit.lute-tlz-dddd.top (AuditScope medical audit KB) ─────
    server {
        listen 443 ssl;
        http2 on;
        server_name audit.lute-tlz-dddd.top;

        ssl_certificate /etc/letsencrypt/live/lute-tlz-dddd.top/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lute-tlz-dddd.top/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 20m;

        # Next.js static export — serve frontend files directly
        location / {
            root /var/www/audit;
            try_files $uri $uri.html /index.html;
            add_header Cache-Control "public, max-age=300, must-revalidate" always;
        }

        # The shared ai_video_nginx config defines upstream medical_audit_app
        # as medical_audit_app:8000. Do not add :8000 here, or nginx will fail
        # validation with "upstream may not have port".
        # Production injects the internal X-API-Key in the server-local config;
        # keep the literal secret out of Git.
        location = /health {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
        }

        location = /query {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        location /index/ {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        location /query/ {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        location /operation/ {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        location /audit/ {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        location /audit-findings/ {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        location /preview/ {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        # Static-exported Next.js pages call /api/backend/* because Next.js
        # rewrites do not run after export; strip the frontend-only prefix.
        location /api/backend/ {
            proxy_pass http://medical_audit_app/;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        # Keep a versioned public API prefix for production smoke and callers
        # that should not depend on the backend's root-level route layout.
        location /api/v1/ {
            proxy_pass http://medical_audit_app/;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        # Backend static files (CSS/JS for Jinja2 pages)
        location /static/ {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
        }

        # Backend page routes (Jinja2 templates) — no /api/v1 prefix
        location /pages/preview/ {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        location /pages/chat {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }
        location /pages/query {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }
        location /pages/review-tasks {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }
        location /review-tasks/ {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }
        location /pages/audit-logs {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }
        location /pages/audit-findings {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }
        location /pages/index-admin {
            proxy_pass http://medical_audit_app;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }
    }

    # ── HTTPS — lute-tlz-dddd.top apex (static landing page) ─────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name lute-tlz-dddd.top;

        ssl_certificate /etc/letsencrypt/live/lute-tlz-dddd.top/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lute-tlz-dddd.top/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        root /var/www/landing;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=300, must-revalidate" always;
        }
    }

